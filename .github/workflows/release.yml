name: Release Magisk/KernelSU Module

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Module ZIP
        run: |
          # Create a clean zip where module.prop is at the root
          # Exclude git, github actions, and other non-module files
          zip -r sara-log-module.zip . -x "*.git*" ".github*" "README.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: sara-log-module.zip
          name: SARA Diagnostic Module ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
